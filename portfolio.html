    <style>
        .masonry { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); grid-auto-rows: 250px; gap: 20px; }
        .masonry-item { overflow: hidden; position: relative; border-radius: 2px; }
        .masonry-item.tall { grid-row: span 2; }
        .masonry-item.wide { grid-column: span 2; }
        .masonry-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
        .masonry-item:hover img { transform: scale(1.05); }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; display: flex; align-items: center; justify-content: center; color: #fff; transition: 0.3s; }
        .masonry-item:hover .overlay { opacity: 1; }
    </style>

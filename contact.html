<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petale și Poveste | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;700&family=Jost:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .form-container { background: var(--surface); padding: 50px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; background: var(--primary); border: 1px solid var(--border); color: var(--text); font-family: inherit; }
    </style>
</head>
<body data-theme="light">
    <div id="cursor"></div>
    <nav>
        <a href="index.html" class="logo">P & P</a>
        <ul class="nav-links">
            <li><a href="index.html">Acasă</a></li>
            <li><a href="about.html">Poveste</a></li>
            <li><a href="services.html">Servicii</a></li>
            <li><a href="portfolio.html">Portofoliu</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div style="display: flex; gap: 20px; align-items: center;">
            <button id="themeToggle" style="background:none; border:none; color:inherit; cursor: pointer;">🌓</button>
            <button id="hamburger" class="hamburger">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="nav-overlay" id="navOverlay">
        <a href="index.html">Acasă</a>
        <a href="about.html">Poveste</a>
        <a href="services.html">Servicii</a>
        <a href="portfolio.html">Portofoliu</a>
        <a href="contact.html">Contact</a>
    </div>

    <section>
        <div class="contact-grid">
            <div class="reveal">
                <h1 style="font-size: 3.5rem; margin-bottom: 30px;">Să discutăm.</h1>
                <p style="font-size: 1.2rem; opacity: 0.7; margin-bottom: 40px;">Ești la un pas de a transforma spațiul tău.</p>
                <div style="margin-bottom: 20px;">
                    <strong>Adresă:</strong> Strada General Magheru 12, Sibiu
                </div>
                <div style="margin-top: 40px;">
                    <a href="https://wa.me/40700000000?text=Bună%20ziua!%20Doresc%20să%20discutăm%20despre%20un%20proiect%20floral." class="btn" style="background: #25D366; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <span>WhatsApp Direct</span>
                    </a>
                </div>
            </div>

            <div class="form-container reveal">
                <form id="contactForm">
                    <div class="form-group">
                        <label>Nume</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Mesaj</label>
                        <textarea rows="5"></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Trimite Mesaj</button>
                </form>
                <div id="success" style="display:none; text-align:center; padding: 40px 0;">
                    <h3>Mesaj trimis cu succes!</h3>
                </div>
            </div>
        </div>
    </section>

    <a href="https://wa.me/40700000000" class="whatsapp-float" target="_blank" aria-label="WhatsApp">
        <svg viewBox="0 0 24 24"><path d="M12.031 6.172c-2.31 0-4.184 1.874-4.184 4.184 0 2.31 1.874 4.184 4.184 4.184 2.31 0 4.184-1.874 4.184-4.184 0-2.31-1.874-4.184-4.184-4.184zm0 6.694c-1.383 0-2.51-1.127-2.51-2.51s1.127-2.51 2.51-2.51 2.51 1.127 2.51 2.51-1.127 2.51-2.51 2.51zm0-10.866C6.48 2 2 6.48 2 12.031c0 1.77.462 3.428 1.266 4.869L2 22l5.225-1.371a9.954 9.954 0 004.806 1.229c5.551 0 10.031-4.48 10.031-10.031S17.582 2 12.031 2zm0 18.39c-1.574 0-3.047-.406-4.328-1.114l-.31-.173-3.21.843.858-3.125-.19-.301a8.31 8.31 0 01-1.275-4.489c0-4.61 3.75-8.36 8.36-8.36s8.36 3.75 8.36 8.36-3.75 8.36-8.36 8.36z"/></svg>
    </a>
    <script src="script.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('contactForm').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        });
    </script>
</body>
</html>
